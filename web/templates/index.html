<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>couple_app</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 640px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #222;
            line-height: 1.4;
        }
        h1 { font-size: 1.25rem; margin: 0 0 1rem; }
        .empty { color: #888; padding: 2rem 0; text-align: center; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 0.75rem 0; border-bottom: 1px solid #eee; }
        li:last-child { border-bottom: none; }
        .text { font-size: 1rem; }
        .meta { color: #888; font-size: 0.8rem; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <h1>Items</h1>
    {% if items %}
        <ul>
            {% for item in items %}
                <li>
                    <div class="text">{{ item.text }}</div>
                    <div class="meta">{{ item.sender_name }} &middot; {{ item.created_at }} UTC</div>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <div class="empty">Nothing captured yet. Text your bot in the group.</div>
    {% endif %}
</body>
</html>
